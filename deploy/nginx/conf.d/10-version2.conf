# ── version2.hr — Main website (Next.js) ──

# HTTP -> HTTPS redirect
server {
    listen 80;
    server_name version2.hr www.version2.hr;
    return 301 https://version2.hr$request_uri;
}

# www -> non-www redirect
server {
    listen 443 ssl;
    server_name www.version2.hr;

    ssl_certificate     /etc/nginx/ssl/origin.pem;
    ssl_certificate_key /etc/nginx/ssl/origin-key.pem;
    ssl_protocols TLSv1.2 TLSv1.3;

    return 301 https://version2.hr$request_uri;
}

# Main site
server {
    listen 443 ssl;
    server_name version2.hr;

    ssl_certificate     /etc/nginx/ssl/origin.pem;
    ssl_certificate_key /etc/nginx/ssl/origin-key.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    # HSTS (Cloudflare also sets this, but defense-in-depth)
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

    # Docker DNS resolver — allows nginx to start even if v2-nextjs is not running
    resolver 127.0.0.11 valid=30s;
    set $nextjs http://v2-nextjs:3000;

    # ── Next.js static assets — immutable cache ──
    location /_next/static/ {
        proxy_pass $nextjs$request_uri;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # ── Public static files ──
    location ~* \.(ico|svg|webp|png|jpg|jpeg|gif|woff2?|ttf|eot)$ {
        proxy_pass $nextjs$request_uri;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        add_header Cache-Control "public, max-age=86400";
    }

    # ── WordPress infrastructure — block ──
    location ~* ^/(wp-admin|wp-login|wp-content|wp-includes|xmlrpc\.php) {
        return 403;
    }

    # ── Everything else -> Next.js ──
    location / {
        proxy_pass $nextjs$request_uri;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;

        # Long timeout for AI chat streaming
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
    }
}
