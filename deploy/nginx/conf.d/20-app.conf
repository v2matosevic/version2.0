# ── app.version2.hr — Digital Business Cards (Laravel) ──
# Proxies to v2-app-nginx:8001 when the v2-app project is deployed.
# Falls back to maintenance page if the upstream is unavailable.

# HTTP -> HTTPS
server {
    listen 80;
    server_name app.version2.hr;
    return 301 https://app.version2.hr$request_uri;
}

server {
    listen 443 ssl;
    server_name app.version2.hr;

    ssl_certificate     /etc/nginx/ssl/origin.pem;
    ssl_certificate_key /etc/nginx/ssl/origin-key.pem;
    ssl_protocols TLSv1.2 TLSv1.3;

    # Docker DNS resolver — allows nginx to start even if v2-app is not running
    resolver 127.0.0.11 valid=30s;
    set $app_upstream http://v2-app-nginx:8001;

    location / {
        proxy_pass $app_upstream$request_uri;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Show maintenance page if upstream is down
        proxy_intercept_errors on;
        error_page 502 503 504 = @maintenance;
    }

    location @maintenance {
        default_type text/html;
        return 503 '<!DOCTYPE html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>app.version2.hr</title><style>*{margin:0;padding:0;box-sizing:border-box}body{min-height:100vh;display:flex;align-items:center;justify-content:center;background:#0c0a09;color:#f0e8e0;font-family:system-ui,sans-serif}main{text-align:center;padding:2rem}h1{font-size:1.5rem;font-weight:300;margin-bottom:0.5rem}p{color:#a8a29e;font-size:0.875rem}</style></head><body><main><h1>app.version2.hr</h1><p>Under maintenance. We\'ll be back soon.</p></main></body></html>';
    }
}
