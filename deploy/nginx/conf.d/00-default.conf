# ── Default server — catch-all for direct IP access ──
# Returns 444 (connection closed) for requests not matching any domain.
# This prevents random bots/scanners from hitting our apps.

server {
    listen 80 default_server;
    listen 443 ssl default_server;
    server_name _;

    # Self-signed fallback cert (for 443 catch-all)
    # Will be replaced by Cloudflare Origin Cert paths
    ssl_certificate     /etc/nginx/ssl/origin.pem;
    ssl_certificate_key /etc/nginx/ssl/origin-key.pem;

    # Close connection with no response
    return 444;
}
