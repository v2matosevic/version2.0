# ── offer.version2.hr — Smart Web Plan (Vanilla PHP) ──
# Currently shows a "coming soon" placeholder.
# Uncomment the proxy block when the PHP container is deployed.

# HTTP → HTTPS
server {
    listen 80;
    server_name offer.version2.hr;
    return 301 https://offer.version2.hr$request_uri;
}

server {
    listen 443 ssl;
    server_name offer.version2.hr;

    ssl_certificate     /etc/nginx/ssl/origin.pem;
    ssl_certificate_key /etc/nginx/ssl/origin-key.pem;
    ssl_protocols TLSv1.2 TLSv1.3;

    # ── Placeholder ──
    location / {
        default_type text/html;
        return 503 '<!DOCTYPE html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>offer.version2.hr — Maintenance</title><style>*{margin:0;padding:0;box-sizing:border-box}body{min-height:100vh;display:flex;align-items:center;justify-content:center;background:#0c0a09;color:#f0e8e0;font-family:system-ui,sans-serif}main{text-align:center;padding:2rem}h1{font-size:1.5rem;font-weight:300;margin-bottom:0.5rem}p{color:#a8a29e;font-size:0.875rem}</style></head><body><main><h1>offer.version2.hr</h1><p>Under maintenance. We\'ll be back soon.</p></main></body></html>';
    }

    # ── When PHP is deployed: ──
