# ============================================================
# Version2.hr — Multi-Project Architecture Reference
# ============================================================
# THIS FILE IS DOCUMENTATION ONLY. It is NOT used for deployment.
#
# The old monolithic compose has been replaced by 6 independent
# Hostinger Docker projects that share the v2-net network.
# Each project deploys independently — no single-point-of-failure,
# no cascading rebuilds.
#
# Project                Source                              Compose Location
# -------                ------                              ----------------
# v2-main (this repo)    GitHub: v2matosevic/version2.0      ./docker-compose.yaml (repo root)
# v2-db                  Raw YAML via Hostinger MCP          deploy/apps/db/docker-compose.yaml
# v2-app                 GitHub: v2matosevic/v2-app          deploy/apps/app/docker-compose.yaml
# v2-web                 GitHub: v2matosevic/v2-web          deploy/apps/web/docker-compose.yaml
# v2-offer               GitHub: v2matosevic/v2-offer        deploy/apps/offer/docker-compose.yaml
# v2-qr                  GitHub: v2matosevic/v2-qr           deploy/apps/qr/docker-compose.yaml
#
# Network:
#   v2-main creates the v2-net bridge network (name: v2-net).
#   All other projects join it as external.
#   Containers resolve each other by container_name (Docker DNS 127.0.0.11).
#
# Deploy order:
#   1. v2-main   — creates v2-net, runs nginx + nextjs
#   2. v2-db     — starts MySQL (if PHP apps need it)
#   3. v2-app, v2-web, v2-offer, v2-qr — in any order
#
# Nginx routing:
#   The v2-nginx container (in v2-main) uses the Docker DNS resolver
#   trick so it starts even when backends are absent. When a backend
#   is unreachable, nginx serves a branded maintenance page.
#
# See docs/deployment.md for full architecture documentation.
# See deploy/apps/README.md for per-app deployment instructions.
# ============================================================

# This file is intentionally left as documentation.
# The actual compose files are in their respective locations above.
