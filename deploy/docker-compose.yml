# ============================================================
# Version2.hr — Full Stack Docker Compose
# ============================================================
# Services:
#   nginx       — Reverse proxy + SSL termination (Cloudflare Origin Cert)
#   nextjs      — Main website (version2.hr) — Next.js 16 standalone
#   mysql       — Shared MySQL 8.0 (app + web + offer databases)
#   app-php     — app.version2.hr — Laravel 10 + PHP 8.2-FPM
#   app-worker  — app.version2.hr — Laravel queue worker
#   web-php     — web.version2.hr — Laravel + PHP 8.2-FPM
#   offer-php   — offer.version2.hr — Vanilla PHP 8.x-FPM
#   qr-nextjs   — qr.version2.hr — Next.js (future, separate app)
# ============================================================

services:

  # ── Reverse Proxy ──
  nginx:
    image: nginx:1.27-alpine
    container_name: v2-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      nextjs:
        condition: service_started
    networks:
      - v2-network
    restart: unless-stopped

  # ── Main Website (version2.hr) ──
  nextjs:
    build:
      context: ..
      dockerfile: Dockerfile
    container_name: v2-nextjs
    expose:
      - "3000"
    env_file:
      - ./env/nextjs.env
    environment:
      - NODE_ENV=production
      - PORT=3000
      - HOSTNAME=0.0.0.0
      - COMING_SOON=true
    volumes:
      - nextjs-data:/app/data
    networks:
      - v2-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/api/health/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # ── Shared MySQL ──
  mysql:
    image: mysql:8.0
    container_name: v2-mysql
    expose:
      - "3306"
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
    volumes:
      - mysql-data:/var/lib/mysql
      - ./mysql/init:/docker-entrypoint-initdb.d:ro
    networks:
      - v2-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    command:
      - --default-authentication-plugin=mysql_native_password
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci

