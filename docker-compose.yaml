# ============================================================
# Version2.hr — Production Docker Compose
# Used by Hostinger VPS Docker project management
# ============================================================
# For the full multi-app reference, see deploy/docker-compose.yml

services:

  # ── Nginx Reverse Proxy ──
  nginx:
    build:
      context: .
      dockerfile: deploy/nginx/Dockerfile
    container_name: v2-nginx
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      nextjs:
        condition: service_started
    networks:
      - v2-network
    restart: unless-stopped

  # ── Main Website (version2.hr) ──
  nextjs:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: v2-nextjs
    expose:
      - "3000"
    environment:
      NODE_ENV: production
      PORT: "3000"
      HOSTNAME: "0.0.0.0"
      COMING_SOON: "true"
      DATABASE_PATH: /app/data/version2.db
      NEXT_PUBLIC_SITE_URL: https://version2.hr
    volumes:
      - nextjs-data:/app/data
    networks:
      - v2-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/api/health/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

volumes:
  nextjs-data:
    driver: local

networks:
  v2-network:
    driver: bridge
