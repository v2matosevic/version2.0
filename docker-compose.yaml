# ============================================================
# Version2.hr — v2-main Docker Compose
# Hostinger project: v2-main (from GitHub: v2matosevic/version2.0)
# ============================================================
# This project owns the shared network and runs nginx + nextjs.
# Other apps (db, app, web, offer, qr) deploy as independent
# Hostinger projects that join v2-net externally.
#
# See deploy/apps/ for per-app compose templates.
# See docs/deployment.md for full architecture.

services:

  # ── Nginx Reverse Proxy ──
  nginx:
    build:
      context: .
      dockerfile: deploy/nginx/Dockerfile
    container_name: v2-nginx
    ports:
      - "80:80"
      - "443:443"
    networks:
      - v2-net
    restart: unless-stopped

  # ── Main Website (version2.hr) ──
  nextjs:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: v2-nextjs
    expose:
      - "3000"
    environment:
      NODE_ENV: production
      PORT: "3000"
      HOSTNAME: "0.0.0.0"
      COMING_SOON: "true"
      DATABASE_PATH: /app/data/version2.db
      NEXT_PUBLIC_SITE_URL: https://version2.hr
    volumes:
      - nextjs-data:/app/data
    networks:
      - v2-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://localhost:3000/api/health/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

volumes:
  nextjs-data:
    driver: local

networks:
  v2-net:
    name: v2-net
    driver: bridge
