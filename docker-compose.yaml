# ============================================================
# Version2.hr — Production Docker Compose
# Used by Hostinger VPS Docker project management
# ============================================================
# For the full multi-app reference, see deploy/docker-compose.yml

services:

  # ── Nginx Reverse Proxy ──
  nginx:
    image: nginx:1.27-alpine
    container_name: v2-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deploy/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./deploy/nginx/conf.d:/etc/nginx/conf.d:ro
      - ssl-certs:/etc/nginx/ssl
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        # Generate self-signed cert if no Cloudflare Origin Cert exists
        if [ ! -f /etc/nginx/ssl/origin.pem ]; then
          apk add --no-cache openssl >/dev/null 2>&1
          openssl req -x509 -nodes -days 365 -newkey rsa:2048 \
            -keyout /etc/nginx/ssl/origin-key.pem \
            -out /etc/nginx/ssl/origin.pem \
            -subj '/C=HR/ST=Zadar/L=Zadar/O=Version2/CN=*.version2.hr' \
            -addext 'subjectAltName=DNS:version2.hr,DNS:*.version2.hr' 2>/dev/null
          echo "Self-signed SSL certificate generated."
        fi
        nginx -g 'daemon off;'
    depends_on:
      nextjs:
        condition: service_started
    networks:
      - v2-network
    restart: unless-stopped

  # ── Main Website (version2.hr) ──
  nextjs:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: v2-nextjs
    expose:
      - "3000"
    environment:
      NODE_ENV: production
      PORT: "3000"
      HOSTNAME: "0.0.0.0"
      COMING_SOON: "true"
      DATABASE_PATH: /app/data/version2.db
      NEXT_PUBLIC_SITE_URL: https://version2.hr
    volumes:
      - nextjs-data:/app/data
    networks:
      - v2-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/api/health/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

volumes:
  nextjs-data:
    driver: local
  ssl-certs:
    driver: local

networks:
  v2-network:
    driver: bridge
